---
- name: Ensure required k3s variables are provided
  ansible.builtin.assert:
    that:
      - k3s_control_plane is defined
    fail_msg: "k3s_control_plane must be defined (host name of the master node)"

- name: Ensure target directory for k3s manifests exists
  ansible.builtin.file:
    path: /var/lib/rancher/k3s/server/manifests
    state: directory
    mode: '0755'
    owner: root
    group: root
  delegate_to: "{{ k3s_control_plane }}"
  become: true

- name: Create required namespaces
  ansible.builtin.copy:
    content: |
      apiVersion: v1
      kind: Namespace
      metadata:
        name: {{ item }}
    dest: "/var/lib/rancher/k3s/server/manifests/{{ item }}-namespace.yaml"
    mode: '0644'
  loop:
    - "{{ argocd_namespace }}"
    - "cert-manager"
  delegate_to: "{{ k3s_control_plane }}"
  become: true

- name: Create cert-manager HelmChart manifest
  ansible.builtin.template:
    src: cert-manager-helmchart.yaml.j2
    dest: /var/lib/rancher/k3s/server/manifests/cert-manager-helmchart.yaml
    mode: '0644'
  delegate_to: "{{ k3s_control_plane }}"
  become: true

- name: Create reflector HelmChart manifest
  ansible.builtin.template:
    src: reflector-helmchart.yaml.j2
    dest: /var/lib/rancher/k3s/server/manifests/reflector-helmchart.yaml
    mode: '0644'
  delegate_to: "{{ k3s_control_plane }}"
  become: true

- name: Create cert-manager issuer and cloudflare secret
  ansible.builtin.template:
    src: cert-manager-issuer.yaml.j2
    dest: /var/lib/rancher/k3s/server/manifests/cert-manager-issuer.yaml
    mode: '0600'
  delegate_to: "{{ k3s_control_plane }}"
  become: true

- name: Create wildcard certificate manifest
  ansible.builtin.template:
    src: wildcard-cert.yaml.j2
    dest: /var/lib/rancher/k3s/server/manifests/wildcard-cert.yaml
    mode: '0644'
  delegate_to: "{{ k3s_control_plane }}"
  become: true

- name: Create reloader HelmChart manifest
  ansible.builtin.template:
    src: reloader-helmchart.yaml.j2
    dest: /var/lib/rancher/k3s/server/manifests/reloader-helmchart.yaml
    mode: '0644'
  delegate_to: "{{ k3s_control_plane }}"
  become: true

- name: Create argocd-sops-age secret manifest
  ansible.builtin.template:
    src: argocd-sops-age.yaml.j2
    dest: /var/lib/rancher/k3s/server/manifests/argocd-sops-age.yaml
    mode: '0600'
  delegate_to: "{{ k3s_control_plane }}"
  become: true
  when: vault_argocd_sops_age_key is defined

- name: Create Argo CD Traefik IngressRoute manifest
  ansible.builtin.template:
    src: argocd-ingressroute.yaml.j2
    dest: /var/lib/rancher/k3s/server/manifests/argocd-ingressroute.yaml
    mode: '0644'
  delegate_to: "{{ k3s_control_plane }}"
  become: true

- name: Create Argo CD HelmChart manifest
  ansible.builtin.template:
    src: argocd-helmchart.yaml.j2
    dest: /var/lib/rancher/k3s/server/manifests/argocd-helmchart.yaml
    mode: '0644'
  delegate_to: "{{ k3s_control_plane }}"
  become: true

- name: Create Argo CD repository secret manifest
  ansible.builtin.template:
    src: argocd-repo.yaml.j2
    dest: /var/lib/rancher/k3s/server/manifests/argocd-repo.yaml
    mode: '0600'
  delegate_to: "{{ k3s_control_plane }}"
  become: true

- name: Create Argo CD ApplicationSet bootstrap manifest
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../gitops/apps/gitops-apps-set.yaml"
    dest: /var/lib/rancher/k3s/server/manifests/gitops-apps-set.yaml
    mode: '0644'
  delegate_to: "{{ k3s_control_plane }}"
  become: true

- name: Wait for Argo CD server to be ready
  ansible.builtin.command:
    argv:
      - kubectl
      - wait
      - --for=condition=available
      - deployment/argocd-server
      - -n
      - "{{ argocd_namespace }}"
      - --timeout=300s
  delegate_to: "{{ k3s_control_plane }}"
  become: true
  changed_when: false
  retries: 10
  delay: 10
  register: argocd_wait_result
  until: argocd_wait_result.rc == 0
