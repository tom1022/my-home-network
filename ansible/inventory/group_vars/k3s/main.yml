---
# k3s group-level variables
# コントロールプレーンをホスト名で指定し、その ansible_host を自動参照する
k3s_control_plane: k3s-server
# コントロールプレーンの接続先。ホスト名の ansible_host を優先して参照します。
k3s_server_endpoint: "{{ hostvars[k3s_control_plane].ansible_host | default(k3s_control_plane) }}"

# Map role expected group names to this inventory group
# role defaults expect `k3s_master_group` and `k3s_agent_group`
k3s_master_group: k3s
k3s_agent_group: k3s
# expose master IP in role-compatible variable
k3s_master_ip: "{{ hostvars[k3s_control_plane].ansible_host | default(k3s_control_plane) }}"
k3s_master_port: 6443

# Temporarily rollback extra args to restore previous network configuration.
# (Previously forced 172.* ranges; cleared to allow k3s defaults.)
k3s_master_extra_args: []
k3s_agent_extra_args: []

# Best-practice: central map of internal IPs for k3s nodes (172.16.0.0/16)
# This keeps per-host IPs in a single authoritative place and avoids
# duplicating node-specific values across multiple files.
k3s_internal_ips:
  k3s-server: "172.16.0.150"
  k3s-agent-minipc: "172.16.0.151"
  k3s-agent-z440: "172.16.0.152"

# Resolve per-host internal IP from the map. If not found, default to empty.
# Roles/templates check for non-empty `k3s_internal_ip` before applying.
k3s_internal_ip: "{{ k3s_internal_ips[inventory_hostname] | default('') }}"

letsencrypt_cert_target: true
