---
sssd_bind_password: "{{ vault_sssd_bind_password | default('') }}"

# Default k3s inventory group names (ensure roles referencing these work when
# running against other target groups)
k3s_master_group: k3s
k3s_agent_group: k3s
k3s_master_port: 6443

letsencrypt_copy_target_hosts: vps
letsencrypt_contact_email: "{{ vault_letsencrypt_contact_email | default('') }}"
letsencrypt_cloudflare_api_token: "{{ vault_letsencrypt_cloudflare_api_token | default('') }}"

# Optional: enable creation of TLS Secrets in k3s from copied certs
letsencrypt_k8s_secrets_enabled: "{{ vault_letsencrypt_k8s_secrets_enabled | default(false) }}"
letsencrypt_k8s_secrets: "{{ vault_letsencrypt_k8s_secrets | default([]) }}"

proxmox_api_host: "{{ vault_proxmox_api_host | default('') }}"
proxmox_api_user: "{{ vault_proxmox_api_user | default('') }}"
proxmox_api_token_id: "{{ vault_proxmox_api_token_id | default('') }}"
proxmox_api_token_secret: "{{ vault_proxmox_api_token_secret | default('') }}"

proxmox_pbs_username: "{{ vault_proxmox_pbs_username | default('') }}"
proxmox_pbs_password: "{{ vault_proxmox_pbs_password | default('') }}"
proxmox_pbs_fingerprint: "{{ vault_proxmox_pbs_fingerprint | default('') }}"
