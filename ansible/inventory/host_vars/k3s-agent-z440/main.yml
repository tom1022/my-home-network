---
# k3s agent node settings
# Use role-expected boolean
k3s_agent: true
# k3s_server_endpoint は group_vars/k3s/main.yml で解決します（ホストの ansible_host を参照）

# Data Storage Settings
agent_data_disks:
  - name: "minio"
    scsi_address: "0:0:0:1"
    partition_number: 1
    filesystem_type: "xfs"
    mount_path: "/var/lib/minio"
  - name: "nextcloud"
    scsi_address: "0:0:0:2"
    partition_number: 1
    filesystem_type: "xfs"
    mount_path: "/var/lib/nextcloud"
